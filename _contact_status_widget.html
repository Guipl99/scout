<!-- ═══════════════════════════════════════════════════════════════════
     SCOUT CONTACT STATUS WIDGET (v2)
     - Cooldown settings injected into existing Config panel
     - Per-contact "+ Action" button opens a drawer with:
         quick actions (email/LinkedIn) + manual log + history
     ═══════════════════════════════════════════════════════════════════ -->
<style>
  .scout-cs-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,.65); z-index: 99998;
    display: none; align-items: center; justify-content: center;
    padding: 20px; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  }
  .scout-cs-overlay.open { display: flex; }
  .scout-cs-modal {
    background: white; border-radius: 14px; width: 640px; max-width: 100%;
    max-height: 90vh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,.3);
  }
  .scout-cs-header {
    padding: 18px 22px; border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: white; z-index: 2;
  }
  .scout-cs-header h3 { margin:0; color:#111827; font-size: 17px; }
  .scout-cs-close {
    background: transparent; border: none; font-size: 24px; cursor: pointer;
    color: #6b7280; line-height: 1; padding: 4px;
  }
  .scout-cs-body { padding: 22px; color:#111827; }
  .scout-cd-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; background: var(--bg3); border-radius: 6px;
  }
  .scout-cd-row-label { flex: 1; font-size: 13px; color: var(--text); }
  .scout-cd-row-input {
    width: 70px; padding: 5px 8px; border: 1px solid var(--border2);
    border-radius: 4px; font-size: 13px; text-align: right; font-family: inherit;
    background: var(--bg2); color: var(--text);
  }
  .scout-cd-row-unit { font-size: 11px; color: var(--text3); width: 48px; }

  .scout-cs-section { margin-bottom: 22px; }
  .scout-cs-section-title {
    font-size: 12px; text-transform: uppercase; letter-spacing: .5px;
    color: #6b7280; font-weight: 600; margin-bottom: 10px;
  }
  .scout-cs-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .scout-cs-action-card {
    padding: 12px 10px; border: 1.5px solid #e5e7eb; background: white;
    border-radius: 8px; cursor: pointer; font-size: 13px;
    color: #111827; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    transition: all 0.15s; font-family: inherit;
  }
  .scout-cs-action-card:hover:not(:disabled) {
    border-color: #1e40af; background: #eff6ff; transform: translateY(-1px);
  }
  .scout-cs-action-card:disabled { opacity: 0.4; cursor: not-allowed; }
  .scout-cs-action-card .icon { font-size: 20px; }
  .scout-cs-action-card .label { font-weight: 500; }
  .scout-cs-action-card .hint { font-size: 10px; color: #9ca3af; }

  .scout-cs-draft {
    background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px;
    padding: 14px; margin-top: 14px; white-space: pre-wrap; font-size: 13px;
    color: #374151; line-height: 1.6; max-height: 250px; overflow-y: auto;
  }
  .scout-cs-draft .subject {
    font-weight: 600; border-bottom: 1px solid #e5e7eb;
    padding-bottom: 8px; margin-bottom: 10px;
  }
  .scout-cs-field { margin-bottom: 12px; }
  .scout-cs-field label {
    display:block; font-size: 12px; color:#374151; font-weight: 500; margin-bottom: 4px;
  }
  .scout-cs-field input, .scout-cs-field select, .scout-cs-field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px;
    font-size: 13px; font-family: inherit; box-sizing: border-box;
  }
  .scout-cs-field textarea { resize: vertical; min-height: 50px; }
  .scout-cs-btn {
    padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit; border: 1px solid transparent;
  }
  .scout-cs-btn-primary { background: #1e40af; color: white; border-color: #1e40af; }
  .scout-cs-btn-primary:hover { background: #1e3a8a; }
  .scout-cs-btn-secondary { background: white; color: #374151; border-color: #d1d5db; }
  .scout-cs-btn-secondary:hover { background: #f9fafb; }
  .scout-cs-confirm-box {
    margin-top: 14px; padding: 14px; background: #fffbeb;
    border: 2px solid #f59e0b; border-radius: 10px;
  }
  .scout-cs-confirm-title { font-weight: 600; color: #78350f; margin-bottom: 8px; font-size: 13px; }
  .scout-cs-confirm-desc { font-size: 12px; color: #78350f; margin-bottom: 12px; }
  .scout-cs-confirm-actions { display: flex; gap: 8px; }
  .scout-cs-confirm-actions .scout-cs-btn { flex: 1; }
  .scout-cs-history-item {
    display: flex; align-items: flex-start; gap: 10px; padding: 10px;
    background: #f9fafb; border-radius: 8px; margin-bottom: 6px;
    border: 1px solid #e5e7eb;
  }
  .scout-cs-history-active { border-left: 3px solid #f59e0b; background: #fffbeb; }
  .scout-cs-history-inactive { opacity: 0.75; }
  .scout-cs-history-main { flex: 1; min-width: 0; }
  .scout-cs-history-type { font-weight: 600; color: #111827; font-size: 13px; }
  .scout-cs-history-meta { font-size: 11px; color: #6b7280; margin-top: 2px; }
  .scout-cs-history-notes { font-size: 12px; color:#4b5563; margin-top: 6px; font-style: italic; }
  .scout-cs-history-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .scout-cs-icon-btn {
    background: transparent; border: 1px solid #d1d5db; border-radius: 4px;
    padding: 3px 7px; font-size: 11px; cursor: pointer; color: #374151;
    font-family: inherit;
  }
  .scout-cs-icon-btn:hover { background: #f3f4f6; }
  .scout-cs-icon-btn.danger { color: #991b1b; border-color: #fecaca; }
  .scout-cs-icon-btn.danger:hover { background: #fef2f2; }
  .scout-cs-loading { text-align: center; padding: 30px; color: #6b7280; font-size: 13px; }
  .scout-cs-contact-info {
    background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px;
    padding: 14px; margin-bottom: 18px;
  }
  .scout-cs-contact-name { font-size: 16px; font-weight: 600; color: #111827; }
  .scout-cs-contact-title { color: #4b5563; font-size: 13px; margin-top: 2px; }
  .scout-cs-contact-meta { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; font-size: 12px; color: #6b7280; }
</style>

<div id="scout-log-modal" class="scout-cs-overlay">
  <div class="scout-cs-modal">
    <div class="scout-cs-header">
      <h3 id="scout-log-title">Contact</h3>
      <button class="scout-cs-close" onclick="scoutContactStatus.closeDrawer()">×</button>
    </div>
    <div class="scout-cs-body" id="scout-log-body">
      <div class="scout-cs-loading">Chargement…</div>
    </div>
  </div>
</div>

<script>
(function(){
  const API = (typeof window !== 'undefined' && window.SCOUT_API_URL) || 'https://scout-api-production-fa8d.up.railway.app';
  const LS_SESSION = 'scout_chat_session';

  function getSession() {
    if (window.scoutSession?.token) return window.scoutSession;
    try { const raw = localStorage.getItem(LS_SESSION); if (raw) return JSON.parse(raw); } catch {}
    return null;
  }
  function authHeaders() {
    const s = getSession();
    return s?.token ? {'Authorization': 'Bearer ' + s.token} : {};
  }
  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
  function formatDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    return isNaN(dt) ? '—' : dt.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'numeric'});
  }

  const ACTION_LABELS = {
    email:              { label: 'Email',                icon: '✉️' },
    linkedin_message:   { label: 'Message LinkedIn',     icon: '📋' },
    linkedin_connect:   { label: 'Connexion LinkedIn',   icon: '💼' },
    phone:              { label: 'Appel téléphonique',   icon: '📞' },
    in_person:          { label: 'Rencontre / salon',    icon: '🤝' },
    third_party:        { label: 'Via un tiers (intro)', icon: '🔗' },
    other:              { label: 'Autre',                icon: '📌' },
  };

  // ═══════════════════════════ CONFIG PANEL INTEGRATION ════════════════
  async function renderCooldownSettings() {
    const container = document.getElementById('scout-cooldowns-container');
    if (!container) return;
    try {
      const r = await fetch(API + '/config', { headers: authHeaders() });
      if (!r.ok) {
        container.innerHTML = '<div style="font-size:12px;color:var(--text3);">Non connecté — impossible de charger les paramètres.</div>';
        return;
      }
      const data = await r.json();
      const list = data.config || [];
      const ordered = ['cooldown_email','cooldown_linkedin_message','cooldown_linkedin_connect',
                       'cooldown_phone','cooldown_in_person','cooldown_third_party','cooldown_other',
                       'lock_duration_minutes','skip_cooldown'];
      const byKey = Object.fromEntries(list.map(r => [r.key, r]));
      container.innerHTML = ordered.filter(k => byKey[k]).map(key => {
        const r = byKey[key];
        const v = r.value || {};
        const unit = v.minutes !== undefined ? 'minutes' : 'jours';
        const val = v.minutes !== undefined ? v.minutes : v.days;
        const desc = r.description || v.label || key;
        return `
          <div class="scout-cd-row">
            <div class="scout-cd-row-label">${escapeHtml(desc)}</div>
            <input type="number" class="scout-cd-row-input" id="cfg-${key}" value="${val || 0}" min="0"
              onchange="scoutContactStatus.saveCooldown('${key}', '${unit}')" />
            <span class="scout-cd-row-unit">${unit}</span>
          </div>
        `;
      }).join('');
    } catch (e) {
      container.innerHTML = `<div style="color:#ef4444;font-size:12px;">Erreur: ${escapeHtml(e.message)}</div>`;
    }
  }

  async function saveCooldown(key, unit) {
    const input = document.getElementById('cfg-' + key);
    const val = parseInt(input.value, 10);
    if (isNaN(val) || val < 0) { input.style.borderColor = '#ef4444'; return; }
    const newValue = unit === 'minutes' ? { minutes: val } : { days: val };
    try {
      const r = await fetch(API + '/config', {
        method: 'PUT',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ key, value: newValue })
      });
      const ind = document.getElementById('scout-cooldowns-saved-ind');
      if (r.ok) {
        input.style.borderColor = '';
        if (ind) { ind.style.opacity = '1'; setTimeout(() => { ind.style.opacity = '0'; }, 1500); }
      } else input.style.borderColor = '#ef4444';
    } catch { input.style.borderColor = '#ef4444'; }
  }

  // Watch for the config panel becoming visible
  function watchConfigPanel() {
    const panel = document.getElementById('panel-config');
    if (!panel) { setTimeout(watchConfigPanel, 1000); return; }
    let wasVisible = false;
    setInterval(() => {
      const visible = panel.classList.contains('active') || window.getComputedStyle(panel).display !== 'none';
      if (visible && !wasVisible) renderCooldownSettings();
      wasVisible = visible;
    }, 500);
  }
  setTimeout(watchConfigPanel, 500);

  // ═══════════════════════════ CONTACT ACTION DRAWER ═══════════════════
  let currentContact = null;
  let currentDraft = null;

  async function openDrawer(contactId, contactName) {
    const modal = document.getElementById('scout-log-modal');
    const body = document.getElementById('scout-log-body');
    const title = document.getElementById('scout-log-title');
    modal.classList.add('open');
    title.textContent = contactName || 'Contact';
    body.innerHTML = '<div class="scout-cs-loading">Chargement…</div>';
    currentContact = { id: contactId, name: contactName };
    currentDraft = null;
    try {
      const [contactR, historyR] = await Promise.all([
        fetch(API + '/contacts/' + encodeURIComponent(contactId)).catch(() => null),
        fetch(API + '/action/history?contact_id=' + encodeURIComponent(contactId), { headers: authHeaders() }),
      ]);
      let contact = null;
      if (contactR && contactR.ok) {
        const d = await contactR.json();
        contact = d.contact || d;
      }
      const historyData = historyR.ok ? await historyR.json() : { actions: [] };
      renderDrawer(contact, historyData.actions || []);
    } catch (e) {
      body.innerHTML = `<div style="color:#ef4444;padding:20px;">Erreur: ${escapeHtml(e.message)}</div>`;
    }
  }

  function renderDrawer(contact, actions) {
    const body = document.getElementById('scout-log-body');
    const c = contact || { id: currentContact?.id };
    const title = document.getElementById('scout-log-title');
    const fullName = [c.prenom, c.nom].filter(Boolean).join(' ') || currentContact.name || c.id;
    title.textContent = fullName;
    currentContact.full_name = fullName;

    const contactInfoHtml = `
      <div class="scout-cs-contact-info">
        <div class="scout-cs-contact-name">${escapeHtml(fullName)}</div>
        ${c.titre ? `<div class="scout-cs-contact-title">${escapeHtml(c.titre)}${c.organisation ? ' — ' + escapeHtml(c.organisation) : ''}</div>` : ''}
        <div class="scout-cs-contact-meta">
          ${c.pays ? `<span>📍 ${escapeHtml(c.pays)}</span>` : ''}
          ${c.email ? `<span>✉️ ${escapeHtml(c.email)}</span>` : ''}
          ${c.linkedin ? `<span>💼 LinkedIn</span>` : ''}
        </div>
      </div>
    `;

    const hasEmail = !!(c.email);
    const hasLinkedin = !!(c.linkedin);

    const quickActionsHtml = `
      <div class="scout-cs-section">
        <div class="scout-cs-section-title">Actions rapides</div>
        <div class="scout-cs-actions-grid">
          <button class="scout-cs-action-card" onclick="scoutContactStatus.openLinkedIn()" ${!hasLinkedin ? 'disabled' : ''}>
            <span class="icon">💼</span>
            <span class="label">Se connecter sur LinkedIn</span>
            <span class="hint">${hasLinkedin ? 'Non loggué' : 'Pas de profil'}</span>
          </button>
          <button class="scout-cs-action-card" onclick="scoutContactStatus.draftEmail()" ${!hasEmail ? 'disabled' : ''}>
            <span class="icon">✉️</span>
            <span class="label">Email de prospection</span>
            <span class="hint">${hasEmail ? 'Cooldown après envoi' : 'Pas d\\'email'}</span>
          </button>
          <button class="scout-cs-action-card" onclick="scoutContactStatus.draftLinkedInMsg()" ${!hasLinkedin ? 'disabled' : ''}>
            <span class="icon">📋</span>
            <span class="label">Message LinkedIn</span>
            <span class="hint">${hasLinkedin ? 'Cooldown après envoi' : 'Pas de profil'}</span>
          </button>
          <button class="scout-cs-action-card" onclick="scoutContactStatus.toggleManualForm()">
            <span class="icon">🔒</span>
            <span class="label">Logger manuellement</span>
            <span class="hint">Appel, salon, etc.</span>
          </button>
        </div>
        <div id="scout-drawer-result"></div>
      </div>
    `;

    const today = new Date().toISOString().slice(0, 10);
    const manualOptions = Object.entries(ACTION_LABELS).map(([type, def]) =>
      `<option value="${type}">${def.icon} ${escapeHtml(def.label)}</option>`
    ).join('');
    const manualFormHtml = `
      <div class="scout-cs-section" id="scout-manual-form" style="display:none;">
        <div class="scout-cs-section-title">Marquer comme contacté manuellement</div>
        <div class="scout-cs-field">
          <label>Moyen</label>
          <select id="scout-log-type">${manualOptions}</select>
        </div>
        <div class="scout-cs-field">
          <label>Date</label>
          <input type="date" id="scout-log-date" value="${today}" max="${today}" />
        </div>
        <div class="scout-cs-field">
          <label>Note (optionnel)</label>
          <textarea id="scout-log-notes" placeholder="Ex: Rencontré à DSEI, carte échangée"></textarea>
        </div>
        <button class="scout-cs-btn scout-cs-btn-primary" onclick="scoutContactStatus.submitManualLog()">
          ✅ Enregistrer
        </button>
      </div>
    `;

    const historyHtml = actions.length === 0
      ? '<div style="font-size:12px; color:#6b7280; padding:8px 0;">Aucune action enregistrée pour ce contact.</div>'
      : actions.map(a => {
          const def = ACTION_LABELS[a.action_type] || { label: a.action_type, icon: '•' };
          const cls = a.active ? 'scout-cs-history-active' : 'scout-cs-history-inactive';
          const notesSafe = JSON.stringify(a.notes || '').replace(/'/g, "\\'");
          return `
            <div class="scout-cs-history-item ${cls}">
              <div class="scout-cs-history-main">
                <div class="scout-cs-history-type">${def.icon} ${escapeHtml(def.label)}${a.active ? ' <span style="font-size:10px;color:#92400e;">(actif jusqu\\'au ' + formatDate(a.cooldown_until) + ')</span>' : ''}</div>
                <div class="scout-cs-history-meta">Par ${escapeHtml(a.performed_by || '?')} le ${formatDate(a.performed_at)}</div>
                ${a.notes ? `<div class="scout-cs-history-notes">"${escapeHtml(a.notes)}"</div>` : ''}
              </div>
              <div class="scout-cs-history-actions">
                <button class="scout-cs-icon-btn" onclick='scoutContactStatus.editAction(${a.id}, "${a.action_type}", "${a.performed_at}", ${notesSafe})'>✏️</button>
                <button class="scout-cs-icon-btn danger" onclick="scoutContactStatus.deleteAction(${a.id})">🗑</button>
              </div>
            </div>
          `;
        }).join('');

    body.innerHTML = contactInfoHtml + quickActionsHtml + manualFormHtml + `
      <div class="scout-cs-section">
        <div class="scout-cs-section-title">Historique (${actions.length})</div>
        ${historyHtml}
      </div>
    `;
    window._scoutCurrentContact = c;
  }

  function toggleManualForm() {
    const form = document.getElementById('scout-manual-form');
    if (!form) return;
    form.style.display = (form.style.display === 'none') ? 'block' : 'none';
    if (form.style.display === 'block') form.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function closeDrawer() {
    document.getElementById('scout-log-modal').classList.remove('open');
    currentContact = null;
    currentDraft = null;
  }

  async function logIntent(actionType, details) {
    if (!currentContact) return;
    try {
      await fetch(API + '/action/log-intent', {
        method: 'POST',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ contact_id: currentContact.id, action_type: actionType, details })
      });
    } catch {}
  }

  async function confirmSent(actionType) {
    try {
      const r = await fetch(API + '/action/confirm', {
        method: 'POST',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ contact_id: currentContact.id, action_type: actionType })
      });
      const data = await r.json();
      if (r.ok) {
        const result = document.getElementById('scout-drawer-result');
        result.innerHTML = `
          <div class="scout-cs-confirm-box" style="background:#ecfdf5; border-color:#10b981;">
            <div class="scout-cs-confirm-title" style="color:#065f46;">✅ Envoi confirmé</div>
            <div class="scout-cs-confirm-desc" style="color:#065f46;">
              Contact verrouillé pour ${data.cooldown_days || '?'} jours.
            </div>
          </div>
        `;
        setTimeout(() => openDrawer(currentContact.id, currentContact.full_name), 400);
        contactStatusCache.clear();
        scanAndUpdate();
      }
    } catch (e) { alert('Erreur: ' + e.message); }
  }

  async function cancelSent() {
    try {
      await fetch(API + '/action/cancel', {
        method: 'POST',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ contact_id: currentContact.id })
      });
    } catch {}
    const result = document.getElementById('scout-drawer-result');
    result.innerHTML = `
      <div class="scout-cs-confirm-box" style="background:#f3f4f6; border-color:#9ca3af;">
        <div class="scout-cs-confirm-title" style="color:#374151;">↩️ Annulé</div>
        <div class="scout-cs-confirm-desc" style="color:#374151;">Aucune trace, contact reste disponible.</div>
      </div>
    `;
  }

  function renderConfirmBox(actionType, humanLabel) {
    const result = document.getElementById('scout-drawer-result');
    result.innerHTML = `
      <div class="scout-cs-confirm-box">
        <div class="scout-cs-confirm-title">⏳ ${escapeHtml(humanLabel)} — confirme l'envoi</div>
        <div class="scout-cs-confirm-desc">Une fois l'envoi réellement effectué, clique sur "C'est envoyé".</div>
        <div class="scout-cs-confirm-actions">
          <button class="scout-cs-btn scout-cs-btn-primary" style="background:#10b981;border-color:#10b981;" onclick="scoutContactStatus.confirmSent('${actionType}')">✅ C'est envoyé</button>
          <button class="scout-cs-btn scout-cs-btn-secondary" onclick="scoutContactStatus.cancelSent()">❌ Annuler</button>
        </div>
      </div>
    `;
  }

  function openLinkedIn() {
    const c = window._scoutCurrentContact;
    if (!c?.linkedin) return;
    window.open(c.linkedin, '_blank', 'noopener');
  }

  async function draftEmail() {
    const c = window._scoutCurrentContact;
    if (!c?.email) return;
    const result = document.getElementById('scout-drawer-result');
    result.innerHTML = '<div class="scout-cs-loading">Génération de l\'email par Claude…</div>';
    try {
      const r = await fetch(API + '/action/draft-email', {
        method: 'POST',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ contact_id: currentContact.id })
      });
      const data = await r.json();
      if (!r.ok) {
        result.innerHTML = `<div class="scout-cs-confirm-box" style="background:#fef2f2; border-color:#dc2626;"><div class="scout-cs-confirm-title" style="color:#991b1b;">${escapeHtml(data.error || 'Erreur')}</div></div>`;
        return;
      }
      currentDraft = { subject: data.subject, body: data.body, to: data.to };
      result.innerHTML = `
        <div class="scout-cs-draft">
          <div class="subject">Objet : ${escapeHtml(data.subject)}</div>
          ${escapeHtml(data.body)}
        </div>
        <div class="scout-cs-actions-grid" style="margin-top:10px;">
          <button class="scout-cs-action-card" onclick="scoutContactStatus.sendEmail()">
            <span class="icon">📮</span><span class="label">Ouvrir dans Outlook</span>
          </button>
          <button class="scout-cs-action-card" onclick="scoutContactStatus.draftEmail()">
            <span class="icon">🔄</span><span class="label">Régénérer</span>
          </button>
        </div>
      `;
    } catch (e) {
      result.innerHTML = `<div style="color:#ef4444;">Erreur: ${escapeHtml(e.message)}</div>`;
    }
  }

  function sendEmail() {
    if (!currentDraft) return;
    const url = `mailto:${encodeURIComponent(currentDraft.to)}?subject=${encodeURIComponent(currentDraft.subject)}&body=${encodeURIComponent(currentDraft.body)}`;
    window.location.href = url;
    logIntent('email', { subject: currentDraft.subject, to: currentDraft.to });
    renderConfirmBox('email', 'Email ouvert dans le client mail');
  }

  async function draftLinkedInMsg() {
    const c = window._scoutCurrentContact;
    if (!c?.linkedin) return;
    const result = document.getElementById('scout-drawer-result');
    result.innerHTML = '<div class="scout-cs-loading">Génération du message…</div>';
    try {
      const r = await fetch(API + '/action/draft-linkedin-message', {
        method: 'POST',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ contact_id: currentContact.id })
      });
      const data = await r.json();
      if (!r.ok) {
        result.innerHTML = `<div style="color:#ef4444;padding:10px;">${escapeHtml(data.error || 'Erreur')}</div>`;
        return;
      }
      let copied = false;
      try { await navigator.clipboard.writeText(data.message); copied = true; } catch {}
      result.innerHTML = `
        <div class="scout-cs-draft">${escapeHtml(data.message)}</div>
        <div style="margin-top:8px; font-size:12px; color:#059669;">
          ${copied ? '✅ Message copié dans le presse-papier' : '⚠️ Copie manuelle nécessaire'}
        </div>
        <div class="scout-cs-actions-grid" style="margin-top:10px;">
          <button class="scout-cs-action-card" onclick="scoutContactStatus.openLinkedInForMsg()">
            <span class="icon">💼</span><span class="label">Ouvrir LinkedIn</span>
          </button>
          <button class="scout-cs-action-card" onclick="scoutContactStatus.draftLinkedInMsg()">
            <span class="icon">🔄</span><span class="label">Régénérer</span>
          </button>
        </div>
      `;
    } catch (e) {
      result.innerHTML = `<div style="color:#ef4444;">Erreur: ${escapeHtml(e.message)}</div>`;
    }
  }

  function openLinkedInForMsg() {
    const c = window._scoutCurrentContact;
    if (!c?.linkedin) return;
    window.open(c.linkedin, '_blank', 'noopener');
    logIntent('linkedin_message');
    renderConfirmBox('linkedin_message', 'LinkedIn ouvert pour envoi du message');
  }

  async function submitManualLog() {
    const type = document.getElementById('scout-log-type').value;
    const date = document.getElementById('scout-log-date').value;
    const notes = document.getElementById('scout-log-notes').value.trim();
    if (!type || !date) { alert('Sélectionne un moyen et une date'); return; }
    try {
      const r = await fetch(API + '/action/log-manual', {
        method: 'POST',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({
          contact_id: currentContact.id, action_type: type,
          performed_at: date, notes: notes || null,
        })
      });
      if (r.ok) {
        openDrawer(currentContact.id, currentContact.full_name);
        contactStatusCache.clear();
        scanAndUpdate();
      } else {
        const d = await r.json();
        alert('Erreur: ' + (d.error || 'inconnue'));
      }
    } catch (e) { alert('Erreur: ' + e.message); }
  }

  async function editAction(id, currentType, currentDate, currentNotes) {
    const newType = prompt(
      'Type d\'action:\n' +
      Object.entries(ACTION_LABELS).map(([k,v]) => `  ${k} = ${v.label}`).join('\n'),
      currentType
    );
    if (!newType || !ACTION_LABELS[newType]) return;
    const dateStr = new Date(currentDate).toISOString().slice(0,10);
    const newDate = prompt('Date (YYYY-MM-DD)', dateStr);
    if (!newDate) return;
    const newNotes = prompt('Note', currentNotes || '');
    try {
      const r = await fetch(API + '/action/edit', {
        method: 'PUT',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ id, action_type: newType, performed_at: newDate, notes: newNotes })
      });
      if (r.ok) {
        openDrawer(currentContact.id, currentContact.full_name);
        contactStatusCache.clear();
        scanAndUpdate();
      } else { const d = await r.json(); alert('Erreur: ' + (d.error || 'inconnue')); }
    } catch (e) { alert('Erreur: ' + e.message); }
  }

  async function deleteAction(id) {
    if (!confirm('Supprimer définitivement ce log ?')) return;
    try {
      const r = await fetch(API + '/action/delete', {
        method: 'DELETE',
        headers: {'Content-Type':'application/json', ...authHeaders()},
        body: JSON.stringify({ id })
      });
      if (r.ok) {
        openDrawer(currentContact.id, currentContact.full_name);
        contactStatusCache.clear();
        scanAndUpdate();
      }
    } catch (e) { alert('Erreur: ' + e.message); }
  }

  // ═══════════════════════════ CARD BUTTONS + STATUS ═══════════════════
  const contactStatusCache = new Map();

  async function fetchStatusBatch(ids) {
    const unknown = ids.filter(id => !contactStatusCache.has(id));
    if (!unknown.length) return;
    try {
      const r = await fetch(API + '/contacts-status?ids=' + encodeURIComponent(unknown.join(',')), { headers: authHeaders() });
      if (!r.ok) return;
      const data = await r.json();
      for (const id of unknown) contactStatusCache.set(id, null);
      for (const [id, s] of Object.entries(data.status || {})) contactStatusCache.set(id, s);
    } catch {}
  }

  function applyCardBtnStyle(btn, contactId) {
    const status = contactStatusCache.get(contactId);
    if (status && status.active) {
      const def = ACTION_LABELS[status.action_type] || { label: status.action_type, icon: '•' };
      btn.style.background = 'rgba(239,68,68,.15)';
      btn.style.border = '1px solid rgba(239,68,68,.4)';
      btn.style.color = '#fca5a5';
      btn.innerHTML = '🔒 Contacté';
      btn.title = `Contacté par ${status.performed_by || '?'} le ${formatDate(status.performed_at)} via ${def.label}. Cooldown jusqu'au ${formatDate(status.cooldown_until)}.`;
    } else {
      btn.style.background = 'rgba(255,255,255,.06)';
      btn.style.border = '1px solid rgba(255,255,255,.12)';
      btn.style.color = '#9ca3af';
      btn.innerHTML = '+ Action';
      btn.title = 'Ouvrir les actions disponibles pour ce contact';
    }
  }

  function injectCardButtons() {
    const cards = document.querySelectorAll('[onclick*="openContactFromGrid"]:not([data-cs-btn])');
    cards.forEach(card => {
      card.setAttribute('data-cs-btn', '1');
      const m = card.getAttribute('onclick').match(/openContactFromGrid\('([^']+)'\)/);
      if (!m) return;
      const contactId = m[1];
      const btn = document.createElement('button');
      btn.className = 'scout-cs-card-btn';
      btn.dataset.contactId = contactId;
      btn.style.cssText = 'position:absolute; top:6px; right:6px; border-radius:6px; padding:3px 8px; font-size:10px; cursor:pointer; z-index:2; font-family:inherit; transition: all 0.15s; font-weight:500;';
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const nameEl = card.querySelector('[style*="font-weight:600"], [style*="font-weight: 600"]');
        const name = nameEl ? nameEl.textContent.replace(/[👤📋💼🚀✓🔒]/g,'').trim() : contactId;
        openDrawer(contactId, name);
      });
      const computed = window.getComputedStyle(card);
      if (computed.position === 'static') card.style.position = 'relative';
      card.appendChild(btn);
      applyCardBtnStyle(btn, contactId);
    });
  }

  function scanAndUpdate() {
    injectCardButtons();
    const cards = document.querySelectorAll('[onclick*="openContactFromGrid"]');
    const ids = [];
    cards.forEach(card => {
      const m = card.getAttribute('onclick').match(/openContactFromGrid\('([^']+)'\)/);
      if (m) ids.push(m[1]);
    });
    if (!ids.length) return;
    fetchStatusBatch(ids).then(() => {
      document.querySelectorAll('.scout-cs-card-btn').forEach(btn => {
        applyCardBtnStyle(btn, btn.dataset.contactId);
      });
    });
  }

  let scanTimer = null;
  const observer = new MutationObserver(() => {
    if (scanTimer) clearTimeout(scanTimer);
    scanTimer = setTimeout(scanAndUpdate, 300);
  });
  setTimeout(() => {
    if (document.body) observer.observe(document.body, { childList: true, subtree: true });
    scanAndUpdate();
  }, 1000);
  setInterval(scanAndUpdate, 5000);

  window.scoutContactStatus = {
    openDrawer, closeDrawer,
    openLinkedIn, draftEmail, sendEmail, draftLinkedInMsg, openLinkedInForMsg,
    toggleManualForm, submitManualLog, confirmSent, cancelSent,
    editAction, deleteAction,
    saveCooldown,
    rescan: scanAndUpdate, invalidateCache: () => contactStatusCache.clear(),
  };
})();
</script>
