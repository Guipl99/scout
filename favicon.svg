<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#0f0f0f"/>
  
  <!-- Crosshair ring -->
  <circle cx="16" cy="16" r="9" stroke="#4f8ef7" stroke-width="1.2" fill="none" opacity="0.6"/>
  
  <!-- Drone body center -->
  <circle cx="16" cy="16" r="3" fill="#4f8ef7"/>
  
  <!-- 4 arms -->
  <line x1="16" y1="16" x2="8" y2="8" stroke="#c0d6ff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="8" stroke="#c0d6ff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="8" y2="24" stroke="#c0d6ff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="24" y2="24" stroke="#c0d6ff" stroke-width="1.2" stroke-linecap="round"/>
  
  <!-- 4 rotors -->
  <circle cx="7" cy="7" r="2.8" fill="none" stroke="#4f8ef7" stroke-width="1.4"/>
  <circle cx="25" cy="7" r="2.8" fill="none" stroke="#4f8ef7" stroke-width="1.4"/>
  <circle cx="7" cy="25" r="2.8" fill="none" stroke="#4f8ef7" stroke-width="1.4"/>
  <circle cx="25" cy="25" r="2.8" fill="none" stroke="#4f8ef7" stroke-width="1.4"/>
  
  <!-- Crosshair ticks -->
  <line x1="16" y1="5" x2="16" y2="7.5" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="24.5" x2="16" y2="27" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5" y1="16" x2="7.5" y2="16" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24.5" y1="16" x2="27" y2="16" stroke="#4f8ef7" stroke-width="1.2" stroke-linecap="round"/>
</svg>
